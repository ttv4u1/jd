<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilot Intelligent System | Reveal Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --success: #00ff88;
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* --- INITIAL REVEAL ANIMATIONS --- */
        .reveal {
            opacity: 0;
            filter: blur(10px);
            transform: translateY(30px);
            animation: revealIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes revealIn {
            to {
                opacity: 1;
                filter: blur(0);
                transform: translateY(0);
            }
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
        .delay-bg { animation: fadeBg 2s ease-out forwards; }

        @keyframes fadeBg {
            from { opacity: 0; }
            to { opacity: 0.08; }
        }

        /* --- BACKGROUND ELEMENTS --- */
        .jata-bg {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; max-width: 450px;
            opacity: 0; z-index: -3;
            filter: grayscale(1) brightness(1.5);
            pointer-events: none;
        }

        .digital-strap {
            position: fixed;
            width: 300%; height: 500px;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 254, 0.05), rgba(240, 147, 251, 0.08), transparent);
            transform: rotate(-25deg);
            z-index: -2;
            filter: blur(100px);
            animation: moveStrap 25s linear infinite;
        }

        @keyframes moveStrap {
            from { transform: rotate(-25deg) translateX(-30%); }
            to { transform: rotate(-25deg) translateX(10%); }
        }

        /* --- AI ASSISTANT --- */
        #ai-assistant {
            position: fixed;
            width: 140px;
            height: 140px;
            z-index: 1000;
            pointer-events: none;
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translate(-50%, -50%);
        }

        .ai-robot {
            font-size: 3.5rem;
            filter: drop-shadow(0 0 15px var(--primary));
            animation: aiFloat 3s ease-in-out infinite;
        }

        .ai-bubble {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid var(--primary);
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 0.8rem;
            width: 240px;
            text-align: center;
            margin-top: 10px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(10px);
            transition: 0.3s;
            line-height: 1.4;
        }

        .ai-bubble.show { opacity: 1; transform: translateY(0); }

        @keyframes aiFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        /* --- UI COMPONENTS --- */
        .lang-switch {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            display: flex; background: var(--glass); padding: 5px; border-radius: 50px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px);
        }

        .lang-btn {
            padding: 6px 14px; border-radius: 50px; border: none; background: transparent; color: #888; cursor: pointer; font-weight: 700; font-size: 0.75rem; transition: 0.3s;
        }

        .lang-btn.active { background: white; color: black; }

        .container { 
            width: 100%; 
            max-width: 1100px; 
            text-align: center; 
            z-index: 10; 
            transition: 0.6s;
            padding: 60px 0;
        }

        .header h1 { 
            font-size: clamp(2rem, 7vw, 4rem); 
            font-weight: 800; 
            background: linear-gradient(to bottom, #fff 50%, #666 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 40px;
            letter-spacing: -1px;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 350px), 1fr)); 
            gap: 25px; 
            padding: 0 10px;
        }

        .card {
            background: var(--glass); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); 
            border-radius: 40px; 
            padding: clamp(3rem, 6vw, 4.5rem) 1.5rem; 
            cursor: pointer; 
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
        }

        .card:hover { transform: translateY(-12px); border-color: var(--primary); background: rgba(255,255,255,0.06); }

        .emoji-pixar { 
            font-size: clamp(4rem, 10vw, 5.5rem); 
            margin-bottom: 1.5rem; 
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5)); 
            animation: float 4s ease-in-out infinite; 
            display: inline-block;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .card h2 { font-size: clamp(1.8rem, 4vw, 2.2rem); margin-bottom: 15px; }
        .card p { color: var(--text-dim); font-size: 0.95rem; line-height: 1.6; margin-bottom: 30px; min-height: 60px; }

        .btn { 
            width: 100%; max-width: 260px; padding: 18px; border-radius: 100px; 
            font-weight: 800; text-transform: uppercase; border: none; cursor: pointer; 
            font-size: 0.85rem; letter-spacing: 1px; 
        }

        .btn-old { background: rgba(255,255,255,0.1); color: #ccc; }
        .btn-new { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #001; box-shadow: 0 10px 25px rgba(0, 242, 254, 0.3); }

        .status { margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .dot { width: 10px; height: 10px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); animation: pulse 1.5s infinite; }
        .status-txt { font-size: 0.75rem; color: var(--success); font-weight: 800; text-transform: uppercase; }

        /* TURBO WARP */
        #warp-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; pointer-events: none; overflow: hidden; }
        .warp-line { position: absolute; width: 2px; height: 150px; background: linear-gradient(to top, transparent, #fff); opacity: 0; }
        .flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 10000; pointer-events: none; }
        .shaking { animation: shake 0.12s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-2px, -1px); } 100% { transform: translate(1px, 1px); } }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } }

        @media (max-width: 768px) {
            #ai-assistant { display: none; }
            .grid { grid-template-columns: 1fr; }
            .container { padding-top: 80px; }
        }
    </style>
</head>
<body id="master-body">

    <div class="flash" id="flash-screen"></div>
    <div id="warp-overlay"></div>

    <div id="ai-assistant">
        <div class="ai-robot">🤖</div>
        <div class="ai-bubble" id="ai-text">Hello, I am Pilot AI.</div>
    </div>

    <!-- Reveal Animated Header -->
    <div class="lang-switch reveal delay-3">
        <button class="lang-btn active" onclick="changeLang('en', this)">EN</button>
        <button class="lang-btn" onclick="changeLang('my', this)">MY</button>
    </div>

    <!-- Background with delay-bg reveal -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/26/Coat_of_arms_of_Malaysia.svg" alt="Jata Negara" class="jata-bg delay-bg">
    <div class="digital-strap"></div>

    <div class="container">
        <header class="reveal">
            <p style="color: var(--primary); letter-spacing: 4px; font-weight: 800; font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase;">Pilot Intelligent System</p>
            <h1 id="txt-main-title">Select Experience</h1>
        </header>

        <div class="grid" id="main-ui">
            <!-- Card 1 Reveal -->
            <div class="card reveal delay-1" id="card-old" onmouseenter="showAI('old')" onmouseleave="hideAI()" onclick="goTurbo('legacy')">
                <div class="emoji-pixar">💾</div>
                <h2 id="txt-old-title">Standard</h2>
                <p id="txt-old-desc">Classic stability for traditional report management and legacy system access.</p>
                <button class="btn btn-old" id="txt-old-btn">Enter Classic</button>
            </div>

            <!-- Card 2 Reveal -->
            <div class="card reveal delay-2" id="card-new" onmouseenter="showAI('new')" onmouseleave="hideAI()" onclick="goTurbo('quantum')">
                <div class="emoji-pixar" style="animation-delay: -2s;">🔮</div>
                <h2 id="txt-new-title">Quantum UI</h2>
                <p id="txt-new-desc">Official logbook precision with full-detail PDF export and zero simulated data.</p>
                <button class="btn btn-new" id="txt-new-btn">Launch Update</button>
                <div class="status">
                    <div class="dot"></div>
                    <span id="txt-status">Version v3.4 Official</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔗 MASUKKAN URL ANDA DI SINI
        // ==========================================
        const URL_LEGACY = "https://ttv4u1.github.io/"; // Ganti URL Standard
        const URL_QUANTUM = "https://ttv4u1.github.io/pv"; // Ganti URL Quantum UI
        // ==========================================

        let lang = 'en';
        const trans = {
            en: {
                title: "Select Experience",
                oldT: "Standard",
                oldD: "Classic stability for traditional report management and legacy system access.",
                oldB: "Enter Classic",
                newT: "Quantum UI",
                newD: "Official logbook precision with full-detail PDF export and zero simulated data.",
                newB: "Launch Update",
                stat: "Version v3.4 Official",
                aiO: "Standard version is best for quick legacy reports and traditional viewing.",
                aiN: "Quantum UI uses 100% authentic logbook details. You can export full details to PDF instantly!"
            },
            my: {
                title: "Pilih Pengalaman",
                oldT: "Standard",
                oldD: "Kestabilan klasik untuk pengurusan laporan tradisional dan akses sistem warisan.",
                oldB: "Masuk Klasik",
                newT: "UI Quantum",
                newD: "Ketepatan buku log rasmi dengan eksport PDF butiran penuh tanpa data rekaan AI.",
                newB: "Lancar Kemas Kini",
                stat: "Versi v3.4 Rasmi",
                aiO: "Versi Standard sesuai untuk laporan warisan pantas dan paparan tradisional.",
                aiN: "UI Quantum menggunakan butiran buku log asli 100% tepat. Boleh eksport ke PDF dengan butiran penuh!"
            }
        };

        const ai = document.getElementById('ai-assistant');
        const aiTxt = document.getElementById('ai-text');

        function showAI(target) {
            const card = document.getElementById(target === 'old' ? 'card-old' : 'card-new');
            const rect = card.getBoundingClientRect();
            ai.style.top = (rect.top + window.scrollY - 30) + 'px';
            ai.style.left = (rect.right - 50) + 'px';
            ai.style.opacity = "1";
            aiTxt.innerText = target === 'old' ? trans[lang].aiO : trans[lang].aiN;
            aiTxt.classList.add('show');
        }

        function hideAI() { aiTxt.classList.remove('show'); ai.style.opacity = "0"; }

        function changeLang(l, btn) {
            lang = l;
            document.getElementById('txt-main-title').innerText = trans[l].title;
            document.getElementById('txt-old-title').innerText = trans[l].oldT;
            document.getElementById('txt-old-desc').innerText = trans[l].oldD;
            document.getElementById('txt-old-btn').innerText = trans[l].oldB;
            document.getElementById('txt-new-title').innerText = trans[l].newT;
            document.getElementById('txt-new-desc').innerText = trans[l].newD;
            document.getElementById('txt-new-btn').innerText = trans[l].newB;
            document.getElementById('txt-status').innerText = trans[l].stat;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function goTurbo(dest) {
            const overlay = document.getElementById('warp-overlay');
            const ui = document.getElementById('main-ui');
            const body = document.getElementById('master-body');
            const flash = document.getElementById('flash-screen');
            
            ai.style.display = "none";
            body.classList.add('shaking');
            ui.style.opacity = "0";
            ui.style.transform = "scale(0.85)";

            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const line = document.createElement('div');
                    line.className = 'warp-line';
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight;
                    const angle = Math.atan2(y - window.innerHeight/2, x - window.innerWidth/2);
                    line.style.left = x + 'px';
                    line.style.top = y + 'px';
                    line.style.transform = `rotate(${angle + Math.PI/2}rad)`;
                    overlay.appendChild(line);
                    line.animate([{transform: `translateY(0)`, opacity:0}, {transform: `translateY(-1200px)`, opacity:1}], {duration: 500});
                    setTimeout(() => line.remove(), 500);
                }, i * 10);
            }

            setTimeout(() => {
                flash.style.opacity = "1";
                flash.style.transition = "opacity 0.4s ease-in";
                setTimeout(() => {
                    window.location.href = (dest === 'legacy') ? URL_LEGACY : URL_QUANTUM;
                }, 400);
            }, 1200);
        }
    </script>
</body>
</html>
