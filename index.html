<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Log BPK Cloud | v3.0.2</title>
    
    <link rel="icon" type="image/png" href="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png">

    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --neon-blue: #3b82f6;
            --neon-green: #22c55e;
            --neon-gold: #f59e0b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1e293b, #0f172a, #000);
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
        }

        .font-digital { font-family: 'Orbitron', sans-serif; }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .btn-3d {
            background: linear-gradient(145deg, #0ea5e9, #2563eb);
            box-shadow: 0 4px 0 #1e40af, 0 8px 15px rgba(0,0,0,0.4);
            transition: 0.1s;
        }
        .btn-3d:active { transform: translateY(2px); box-shadow: 0 1px 0 #1e40af; }

        .jata-bg {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70%; opacity: 0.04;
            z-index: -1; pointer-events: none;
        }

        .input-field {
            background: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px;
            color: white !important;
            font-size: 0.85rem;
            width: 100%;
            outline: none;
        }
        .input-field:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }

        #loginScreen {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }

        .swal-glass {
            background: rgba(15, 23, 42, 0.98) !important;
            backdrop-filter: blur(25px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            border-radius: 30px !important;
        }

        .clickable-header { cursor: pointer; transition: 0.3s; }
        .clickable-header:hover { background: rgba(59, 130, 246, 0.2) !important; }

        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }
    </style>
</head>
<body class="p-3 md:p-6">

    <img src="https://upload.wikimedia.org/wikipedia/commons/2/26/Coat_of_arms_of_Malaysia.svg" class="jata-bg">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <div class="glass p-10 max-w-sm w-full text-center border-t-4 border-blue-500 shadow-2xl" data-aos="zoom-in">
            <img src="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png" class="h-24 mx-auto mb-6 drop-shadow-2xl">
            <h2 class="text-2xl font-extrabold uppercase tracking-widest mb-1">BPK CLOUD</h2>
            <p class="text-[10px] text-blue-400 mb-10 uppercase tracking-widest font-bold">Intelligence System v3.0.2</p>
            <button onclick="login()" class="flex items-center justify-center gap-4 w-full py-4 px-6 rounded-2xl font-bold text-sm transition-all border border-white/10 bg-white/5 hover:bg-white/10 shadow-xl">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="h-6">
                <span>MASUK DENGAN GOOGLE</span>
            </button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden">
        
        <header class="container mx-auto mb-8" data-aos="fade-down">
            <div class="glass p-4 flex flex-wrap justify-between items-center gap-6 shadow-2xl">
                <div class="flex items-center gap-4">
                    <img src="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png" class="h-10 lg:h-12 rounded-lg">
                    <div class="flex flex-col">
                        <h1 class="text-white text-sm lg:text-lg font-extrabold uppercase leading-none tracking-tight">BPK VETERINAR CLOUD</h1>
                        <div class="flex items-center gap-2 mt-1">
                            <img id="userAvatar" class="h-4 w-4 rounded-full">
                            <span id="userName" class="text-[9px] text-blue-400 font-bold uppercase tracking-widest">---</span>
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-4 bg-black/40 px-6 py-2 rounded-2xl border border-white/5 shadow-inner">
                    <div class="flex flex-col items-center">
                        <div class="flex items-baseline gap-1">
                            <span id="realTime" class="text-xl md:text-3xl font-digital font-bold text-blue-400">00:00:00</span>
                            <span id="realAMPM" class="text-[10px] font-bold text-white/30 uppercase">AM</span>
                        </div>
                    </div>
                    <div class="h-6 w-[1px] bg-white/10"></div>
                    <div class="flex flex-col text-left font-bold">
                        <p id="realDay" class="text-[10px] text-blue-500 uppercase tracking-widest leading-none">---</p>
                        <p id="realDate" class="text-[9px] text-white/40 font-medium leading-none mt-1 uppercase">--/--/----</p>
                    </div>
                </div>
                <button onclick="logout()" class="bg-red-500/10 border border-red-500/30 text-red-500 text-[9px] px-5 py-2 rounded-full font-bold uppercase tracking-widest hover:bg-red-600 hover:text-white transition shadow-lg">LOGOUT 🔒</button>
            </div>
        </header>

        <main class="container mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <!-- INPUT RAIL -->
                <div class="lg:col-span-4 space-y-6">
                    <div class="glass p-6 border-t-4 border-blue-500 shadow-xl">
                        <div class="mb-5 flex bg-black/50 p-1.5 rounded-xl border border-white/5">
                            <button onclick="setType('tugas')" id="btnTugas" class="flex-1 py-2 text-[10px] font-bold rounded-lg transition-all bg-blue-600 text-white uppercase shadow-lg">Tugas</button>
                            <button onclick="setType('log')" id="btnLog" class="flex-1 py-2 text-[10px] font-bold rounded-lg transition-all text-white/40 uppercase">Gerak</button>
                            <button onclick="setType('minyak')" id="btnMinyak" class="flex-1 py-2 text-[10px] font-bold rounded-lg transition-all text-white/40 uppercase">Minyak</button>
                        </div>
                        
                        <div class="space-y-4">
                            <input type="text" id="datePicker" class="input-field" placeholder="Pilih Tarikh">
                            
                            <div class="grid grid-cols-3 gap-2">
                                <input type="text" id="timeFrom" class="input-field font-digital text-center" placeholder="DARI">
                                <input type="text" id="timeSemasa" class="input-field font-digital text-center" placeholder="SEMASA">
                                <input type="text" id="timeTo" class="input-field font-digital text-center" placeholder="HINGGA">
                            </div>

                            <!-- Form Gerak -->
                            <div id="movementFields" class="hidden space-y-4">
                                <div class="grid grid-cols-3 gap-2">
                                    <input type="text" id="fromLoc" class="input-field" placeholder="MULA">
                                    <input type="text" id="semasaLoc" class="input-field" placeholder="TRANSIT">
                                    <input type="text" id="toLoc" class="input-field" placeholder="AKHIR">
                                </div>
                            </div>

                            <!-- Form Minyak -->
                            <div id="fuelFields" class="hidden space-y-4">
                                <div class="grid grid-cols-2 gap-3">
                                    <select id="fuelType" class="input-field">
                                        <option value="RON 95">RON 95</option>
                                        <option value="RON 97">RON 97</option>
                                        <option value="DIESEL">DIESEL</option>
                                    </select>
                                    <input type="number" id="fuelAmount" class="input-field" placeholder="JUMLAH RM">
                                </div>
                            </div>

                            <input type="number" id="odoVal" class="input-field" placeholder="ODOMETER TERKINI (KM)">
                            <textarea id="taskInput" rows="3" class="input-field" placeholder="Butiran tugasan / catatan perincian..."></textarea>
                            
                            <button onclick="saveEntry()" class="w-full btn-3d py-4 text-xs font-extrabold uppercase tracking-widest text-white shadow-blue-500/20">Simpan Ke Cloud 💾</button>
                        </div>
                    </div>

                    <!-- INTELLIGENCE HUB -->
                    <div class="glass p-6 border-l-4 border-yellow-500 shadow-xl" data-aos="zoom-in">
                        <h3 class="text-[10px] font-extrabold text-yellow-500 uppercase tracking-[0.3em] mb-4 text-center">Cloud Analysis Hub</h3>
                        <button onclick="showMonthSummary()" class="w-full btn-3d bg-yellow-600/50 text-[10px] py-3 rounded-lg uppercase border border-yellow-500/30 mb-4">🔍 Ringkasan Bulanan</button>
                    </div>
                </div>

                <!-- ACTIVE LOG -->
                <div class="lg:col-span-8">
                    <div class="glass flex flex-col min-h-[600px] shadow-2xl overflow-hidden">
                        <div class="p-5 bg-white/5 border-b border-white/5 flex flex-wrap justify-between items-center gap-4">
                            <h3 class="font-bold uppercase tracking-widest text-[11px] text-blue-300">Live Log Aktif</h3>
                            <div class="flex gap-4 text-[9px] font-bold uppercase tracking-widest">
                                <span class="text-white border-b border-white">● Tugas</span>
                                <span class="text-green-400 border-b border-green-400">● Gerak</span>
                                <span class="text-red-400 border-b border-red-400">● Minyak</span>
                            </div>
                        </div>
                        
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead class="bg-black/30 text-[9px] uppercase text-white/40 tracking-[0.2em] border-b border-white/5">
                                    <tr>
                                        <th class="p-5">Waktu Fasa</th>
                                        <th class="p-5">Keterangan Aktiviti / Kewangan</th>
                                        <th class="p-5 text-right">Tindakan</th>
                                    </tr>
                                </thead>
                                <tbody id="activeBody" class="divide-y divide-white/5 text-white"></tbody>
                            </table>
                            <div id="activeEmpty" class="p-20 text-center opacity-20 hidden">
                                <p class="text-6xl mb-4">📂</p>
                                <p class="text-xs font-bold uppercase tracking-widest">Peti Log Kosong</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Audio & Scripts -->
    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        AOS.init();

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
          apiKey: "AIzaSyBCV-68YWkZkDjIodxWmn6z-d9H7ZS8bDs",
          authDomain: "bpk-cloud-system.firebaseapp.com",
          projectId: "bpk-cloud-system",
          storageBucket: "bpk-cloud-system.firebasestorage.app",
          messagingSenderId: "690773145817",
          appId: "1:690773145817:web:4a6638d25d572499fb66c8"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let tasks = [];

        // AUTH MONITOR
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userAvatar').src = user.photoURL;
                syncData();
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(e => alert(e.message));
        }

        function logout() { auth.signOut(); }

        // SYNC DATA
        function syncData() {
            db.collection("users").doc(currentUser.uid).collection("logs")
              .orderBy("id", "desc")
              .onSnapshot(snap => {
                  tasks = snap.docs.map(doc => ({ docId: doc.id, ...doc.data() }));
                  renderUI();
              });
        }

        let currentType = 'tugas';
        function setType(type) {
            currentType = type;
            const bTugas = document.getElementById('btnTugas');
            const bLog = document.getElementById('btnLog');
            const bMinyak = document.getElementById('btnMinyak');
            
            [bTugas, bLog, bMinyak].forEach(b => b.className = "flex-1 py-2 text-[10px] font-bold rounded-lg transition-all text-white/40 uppercase shadow-none");
            
            if(type === 'tugas') bTugas.className = "flex-1 py-2 text-[10px] font-bold rounded-lg transition-all bg-blue-600 text-white uppercase shadow-lg";
            if(type === 'log') bLog.className = "flex-1 py-2 text-[10px] font-bold rounded-lg transition-all bg-green-600 text-white uppercase shadow-lg";
            if(type === 'minyak') bMinyak.className = "flex-1 py-2 text-[10px] font-bold rounded-lg transition-all bg-red-600 text-white uppercase shadow-lg";

            document.getElementById('movementFields').style.display = (type === 'log') ? 'block' : 'none';
            document.getElementById('fuelFields').style.display = (type === 'minyak') ? 'block' : 'none';
        }

        async function saveEntry() {
            const date = document.getElementById('datePicker').value;
            const tFrom = document.getElementById('timeFrom').value;
            if(!date || !tFrom) return Swal.fire('Ralat', 'Tarikh dan Masa Dari wajib diisi.', 'error');

            const odo = parseFloat(document.getElementById('odoVal').value) || 0;
            const lastWithOdo = tasks.find(t => t.odo > 0);
            let dist = (odo > 0 && lastWithOdo) ? Math.max(0, odo - lastWithOdo.odo) : 0;

            const newEntry = {
                id: Date.now(),
                type: currentType,
                date,
                monthYear: date.split('-')[1] + '-' + date.split('-')[2],
                tFrom,
                tSemasa: document.getElementById('timeSemasa').value || '-',
                tTo: document.getElementById('timeTo').value || '-',
                from: document.getElementById('fromLoc').value || '-',
                sLoc: document.getElementById('semasaLoc').value || '-',
                to: document.getElementById('toLoc').value || '-',
                odo,
                distance: dist,
                fuelAmount: parseFloat(document.getElementById('fuelAmount').value) || 0,
                fuelType: document.getElementById('fuelType').value,
                note: document.getElementById('taskInput').value || '-'
            };

            await db.collection("users").doc(currentUser.uid).collection("logs").add(newEntry);
            
            ['datePicker','timeFrom','timeSemasa','timeTo','fromLoc','semasaLoc','toLoc','odoVal','taskInput','fuelAmount'].forEach(id => {
                if(document.getElementById(id)) document.getElementById(id).value = '';
            });
            Swal.fire({ icon: 'success', title: 'Data Berjaya Disimpan', timer: 1000, showConfirmButton: false });
        }

        function renderUI() {
            const body = document.getElementById('activeBody');
            body.innerHTML = '';
            if(tasks.length === 0) { document.getElementById('activeEmpty').classList.remove('hidden'); return; }
            document.getElementById('activeEmpty').classList.add('hidden');

            const grouped = tasks.reduce((acc, t) => {
                acc[t.date] = acc[t.date] || [];
                acc[t.date].push(t);
                return acc;
            }, {});

            Object.keys(grouped).sort((a,b) => {
                const da = a.split('-'), db = b.split('-');
                return new Date(db[2],db[1],db[0]) - new Date(da[2],da[1],da[0]);
            }).forEach(date => {
                const dateTasks = grouped[date];
                const header = document.createElement('tr');
                header.className = "clickable-header bg-blue-500/10 border-l-4 border-blue-500 shadow-lg";
                header.onclick = () => showDaySummary(date);
                header.innerHTML = `<td colspan="3" class="p-3 text-[10px] font-extrabold uppercase text-blue-300">📅 ${date} <span class="ml-2 opacity-50 italic">[Lihat Penyatuan]</span></td>`;
                body.appendChild(header);

                dateTasks.forEach(t => {
                    const isM = t.type === 'minyak';
                    const isL = t.type === 'log';
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-white/5 border-b border-white/5 transition cursor-pointer";
                    tr.onclick = () => showDetails(t);
                    tr.innerHTML = `
                        <td class="p-4 font-digital ${isL ? 'text-green-500' : isM ? 'text-red-400' : 'text-white'} text-[10px]">
                            ${t.tFrom} → ${t.tTo}
                        </td>
                        <td class="p-4">
                            <div class="font-medium text-[12px]">${t.note.substring(0,50)}...</div>
                            ${isL ? `<div class="text-[9px] text-green-500/60 font-bold mt-1 uppercase">📍 ${t.from} > ${t.to} | +${t.distance}KM</div>` : ''}
                            ${isM ? `<div class="text-[9px] text-red-400 font-extrabold mt-1">ISIAN: RM ${t.fuelAmount} (${t.fuelType})</div>` : ''}
                        </td>
                        <td class="p-4 text-right">
                            <button onclick="event.stopPropagation(); deleteEntry('${t.docId}')" class="text-red-500/30 hover:text-red-500 text-[9px] font-bold uppercase">Padam</button>
                        </td>
                    `;
                    body.appendChild(tr);
                });
            });
        }

        // PENYATUAN DATA HARIAN
        function showDaySummary(date) {
            const dayRecords = tasks.filter(t => t.date === date);
            const totalFuel = dayRecords.reduce((s,t) => s + (t.fuelAmount || 0), 0);
            
            let html = `
                <div class="bg-red-500/10 p-4 rounded-2xl border border-red-500/30 text-center mb-4">
                    <p class="text-red-400 text-[10px] font-bold uppercase tracking-widest">Total Minyak Hari Ini</p>
                    <p class="text-3xl font-bold">RM ${totalFuel.toFixed(2)}</p>
                </div>
                <div class="space-y-3 max-h-[400px] overflow-y-auto pr-2">`;
            
            dayRecords.forEach(t => {
                const color = t.type==='log' ? 'text-green-400' : t.type==='minyak' ? 'text-red-400' : 'text-blue-400';
                html += `
                    <div class="p-3 bg-white/5 border border-white/5 rounded-xl">
                        <p class="text-[9px] font-bold uppercase ${color}">${t.type} (${t.tFrom})</p>
                        <p class="text-xs mt-1">${t.note}</p>
                        ${t.type==='minyak' ? `<p class="text-[9px] text-yellow-500 mt-1">RM ${t.fuelAmount} | Odo: ${t.odo}</p>`:''}
                        ${t.type==='log' ? `<p class="text-[9px] text-green-500 mt-1">📍 ${t.from} > ${t.to}</p>`:''}
                    </div>`;
            });
            html += `</div>`;
            Swal.fire({ customClass:{popup:'swal-glass'}, title:`Summary: ${date}`, html });
        }

        // RINGKASAN BULANAN
        function showMonthSummary() {
            const curMY = (new Date().getMonth()+1).toString().padStart(2,'0') + '-' + new Date().getFullYear();
            const monthData = tasks.filter(t => t.monthYear === curMY);
            const totalRM = monthData.reduce((s,t) => s + (t.fuelAmount || 0), 0);
            const totalKM = monthData.reduce((s,t) => s + (t.distance || 0), 0);

            let html = `
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="bg-red-500/10 p-4 rounded-2xl border border-red-500/20 text-center">
                        <p class="text-red-400 text-[9px] font-bold uppercase">RM Minyak</p>
                        <p class="text-xl font-bold">RM ${totalRM.toFixed(2)}</p>
                    </div>
                    <div class="bg-green-500/10 p-4 rounded-2xl border border-green-500/20 text-center">
                        <p class="text-green-400 text-[9px] font-bold uppercase">Jarak KM</p>
                        <p class="text-xl font-bold">${totalKM} KM</p>
                    </div>
                </div>
                <div class="max-h-[300px] overflow-y-auto pr-2 space-y-2">
                    ${monthData.map(t => `<div class="flex justify-between text-[10px] border-b border-white/5 pb-2">
                        <span><b>${t.date}</b>: ${t.type.toUpperCase()}</span>
                        <span class="${t.fuelAmount>0?'text-red-400':'text-blue-400'}">${t.fuelAmount>0?'RM '+t.fuelAmount:t.tFrom}</span>
                    </div>`).join('')}
                </div>`;
            Swal.fire({ customClass:{popup:'swal-glass'}, title:`Analisis Bulanan`, html });
        }

        function showDetails(t) {
            Swal.fire({
                customClass: { popup: 'swal-glass' },
                title: `<span class="text-blue-400 font-bold uppercase text-sm">Butiran Rekod</span>`,
                html: `
                    <div class="text-left space-y-4 p-2 text-white text-xs">
                        <div class="grid grid-cols-3 gap-2 text-center bg-black/40 p-3 rounded-xl border border-white/5 font-digital text-[9px]">
                            <div><span class="opacity-30">MULA</span><br>${t.tFrom}</div>
                            <div><span class="opacity-30">SEMASA</span><br>${t.tSemasa}</div>
                            <div><span class="opacity-30">AKHIR</span><br>${t.tTo}</div>
                        </div>
                        ${t.type === 'log' ? `<div class="bg-green-500/10 p-4 rounded-xl border border-green-500/20"><p class="text-green-400 font-bold">📍 ${t.from} → ${t.to}</p><p class="mt-1">Jarak: +${t.distance} KM (Odo: ${t.odo})</p></div>` : ''}
                        ${t.type === 'minyak' ? `<div class="bg-red-500/10 p-4 rounded-xl border border-red-500/20"><p class="text-red-400 font-bold">Refuel: RM ${t.fuelAmount} (${t.fuelType})</p><p class="mt-1">Odometer: ${t.odo} KM</p></div>` : ''}
                        <div class="p-4 bg-white/5 rounded-xl italic text-sm leading-relaxed">${t.note}</div>
                    </div>`
            });
        }

        async function deleteEntry(docId) {
            const res = await Swal.fire({ title: 'Padam Permanen?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: '#0f172a', color: '#fff' });
            if(res.isConfirmed) await db.collection("users").doc(currentUser.uid).collection("logs").doc(docId).delete();
        }

        // CLOCK
        setInterval(() => {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds(), ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12; m = m < 10 ? '0'+m : m; s = s < 10 ? '0'+s : s;
            document.getElementById('realTime').textContent = `${h}:${m}:${s}`;
            document.getElementById('realDate').textContent = now.toLocaleDateString('ms-MY');
            document.getElementById('realDay').textContent = ["AHAD","ISNIN","SELASA","RABU","KHAMIS","JUMAAT","SABTU"][now.getDay()];
            document.getElementById('realAMPM').textContent = ampm;
        }, 1000);

        flatpickr("#datePicker", { dateFormat: "d-m-Y" });
        ['#timeFrom','#timeSemasa','#timeTo'].forEach(id => flatpickr(id, { enableTime:true, noCalendar:true, dateFormat: "h:i K" }));
        setType('tugas');
    </script>
</body>
</html>
