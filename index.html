<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPK Cloud Center | v3.0.0</title>
    
    <link rel="icon" type="image/png" href="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png">

    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">

    <!-- Firebase SDK (Modular) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- Export Libs -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --neon-blue: #3b82f6;
            --neon-green: #22c55e;
            --neon-gold: #f59e0b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1e293b, #0f172a, #000);
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .font-digital { font-family: 'Orbitron', sans-serif; }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        /* 3D Pixar Button */
        .btn-3d {
            background: linear-gradient(145deg, #0ea5e9, #2563eb);
            box-shadow: 0 4px 0 #1e40af, 0 8px 15px rgba(0,0,0,0.4);
            transition: 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-3d:active { transform: translateY(2px); box-shadow: 0 1px 0 #1e40af; }

        .login-btn {
            @apply flex items-center justify-center gap-3 w-full py-3 px-4 rounded-xl font-bold text-sm transition-all border border-white/10 hover:bg-white/10;
        }

        .jata-bg {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70%; opacity: 0.04;
            z-index: -1; pointer-events: none;
        }

        .input-field {
            background: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 10px;
            color: white !important;
            font-size: 0.8rem;
            width: 100%;
            outline: none;
        }

        #loginScreen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hidden { display: none !important; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }
    </style>
</head>
<body class="p-3 md:p-6">

    <img src="https://upload.wikimedia.org/wikipedia/commons/2/26/Coat_of_arms_of_Malaysia.svg" class="jata-bg">

    <!-- LOGIN SCREEN OVERLAY -->
    <div id="loginScreen">
        <div class="glass p-8 max-w-sm w-full text-center border-t-4 border-blue-500 shadow-2xl" data-aos="zoom-in">
            <img src="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png" class="h-20 mx-auto mb-4">
            <h2 class="text-xl font-extrabold uppercase tracking-widest mb-1">Sistem Cloud BPK</h2>
            <p class="text-[10px] text-white/40 mb-8 uppercase tracking-widest font-bold">Bahagian Penguat Kuasa Veterinar</p>
            
            <div class="space-y-3">
                <button onclick="loginWith('google')" class="login-btn bg-white/5 text-white">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="h-5"> Login with Google
                </button>
                <button onclick="loginWith('yahoo')" class="login-btn bg-purple-900/20 text-purple-400">
                    📧 Login with Yahoo
                </button>
                <button onclick="loginWith('discord')" class="login-btn bg-indigo-900/20 text-indigo-400">
                    🎮 Login with Discord
                </button>
                <button onclick="loginWith('onedrive')" class="login-btn bg-blue-900/20 text-blue-400">
                    ☁️ Login with OneDrive
                </button>
            </div>
            <p class="mt-6 text-[8px] text-white/20 uppercase tracking-widest font-bold italic">Data anda akan disimpan secara kekal dalam Cloud.</p>
        </div>
    </div>

    <!-- MAIN APP CONTENT (Hidden until login) -->
    <div id="mainApp" class="hidden">
        
        <!-- HEADER -->
        <header class="container mx-auto mb-8">
            <div class="glass p-4 flex flex-wrap justify-between items-center gap-6 shadow-2xl">
                <div class="flex items-center gap-4">
                    <div class="flex items-center -space-x-2">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/2/26/Coat_of_arms_of_Malaysia.svg" class="h-10 lg:h-12">
                        <img src="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png" class="h-10 lg:h-12 rounded-lg">
                    </div>
                    <div class="h-10 w-[1px] bg-white/10 hidden md:block"></div>
                    <div class="flex flex-col">
                        <h1 class="text-white text-sm font-extrabold uppercase leading-none">BPK CLOUD <span class="text-xs text-blue-500 font-mono">v3.0</span></h1>
                        <div class="flex items-center gap-2 mt-1">
                            <img id="userAvatar" class="h-4 w-4 rounded-full">
                            <span id="userName" class="text-[9px] text-blue-400 font-bold uppercase tracking-widest">User Name</span>
                        </div>
                    </div>
                </div>

                <!-- CLOCK -->
                <div class="flex items-center gap-4 bg-black/40 px-6 py-2 rounded-2xl border border-white/5">
                    <div class="flex items-baseline gap-1">
                        <span id="realTime" class="text-xl md:text-2xl font-digital font-bold text-blue-400">00:00:00</span>
                        <span id="realAMPM" class="text-[10px] font-bold text-white/30 uppercase">AM</span>
                    </div>
                </div>
                
                <button onclick="logout()" class="bg-red-500/10 border border-red-500/30 text-red-500 text-[9px] px-5 py-2 rounded-full font-bold uppercase tracking-widest hover:bg-red-600 hover:text-white transition">LOGOUT 🔒</button>
            </div>
        </header>

        <main class="container mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <!-- LEFT RAIL: INPUT -->
                <div class="lg:col-span-4 space-y-6">
                    <div class="glass p-6 border-t-4 border-blue-500 shadow-xl">
                        <div class="mb-5 flex bg-black/50 p-1.5 rounded-xl border border-white/5">
                            <button onclick="setType('tugas')" id="btnTugas" class="flex-1 py-1.5 text-[9px] font-bold rounded-md transition-all bg-blue-600 text-white uppercase">Tugas</button>
                            <button onclick="setType('log')" id="btnLog" class="flex-1 py-1.5 text-[9px] font-bold rounded-md transition-all text-white/40 uppercase">Gerak</button>
                            <button onclick="setType('minyak')" id="btnMinyak" class="flex-1 py-1.5 text-[9px] font-bold rounded-md transition-all text-white/40 uppercase">Minyak</button>
                        </div>
                        
                        <div class="space-y-4">
                            <input type="text" id="datePicker" class="input-field" placeholder="Pilih Tarikh">
                            <div class="grid grid-cols-3 gap-2">
                                <input type="text" id="timeFrom" class="input-field font-digital text-center" placeholder="DARI">
                                <input type="text" id="timeSemasa" class="input-field font-digital text-center" placeholder="SEMASA">
                                <input type="text" id="timeTo" class="input-field font-digital text-center" placeholder="HINGGA">
                            </div>

                            <div id="movementFields" class="hidden animate-fade-in space-y-4">
                                <div class="grid grid-cols-3 gap-2">
                                    <input type="text" id="fromLoc" class="input-field" placeholder="Mula">
                                    <input type="text" id="semasaLoc" class="input-field" placeholder="Transit">
                                    <input type="text" id="toLoc" class="input-field" placeholder="Akhir">
                                </div>
                            </div>

                            <div id="fuelFields" class="hidden animate-fade-in space-y-4">
                                <div class="grid grid-cols-2 gap-3">
                                    <select id="fuelType" class="input-field">
                                        <option value="RON 95">RON 95</option>
                                        <option value="RON 97">RON 97</option>
                                        <option value="DIESEL">DIESEL</option>
                                    </select>
                                    <input type="number" id="fuelAmount" class="input-field" placeholder="RM 0.00">
                                </div>
                            </div>

                            <input type="number" id="odoVal" class="input-field" placeholder="Odometer Terkini (KM)">
                            <textarea id="taskInput" rows="3" class="input-field" placeholder="Butiran tugasan / catatan perincian..."></textarea>
                            
                            <button onclick="saveEntry()" class="w-full btn-3d py-4 text-xs font-extrabold uppercase tracking-widest text-white shadow-blue-500/20">Cloud Save ☁️</button>
                        </div>
                    </div>

                    <!-- INTELLIGENCE HUB -->
                    <div class="glass p-5 border-l-4 border-yellow-500 shadow-xl">
                        <h3 class="text-[10px] font-extrabold text-yellow-500 uppercase tracking-[0.3em] mb-4 text-center">Cloud Export Hub</h3>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="exportWord()" class="btn-3d bg-blue-700/50 text-[8px] py-2 rounded-lg uppercase">📄 Word</button>
                            <button onclick="exportExcel()" class="btn-3d bg-green-700/50 text-[8px] py-2 rounded-lg uppercase">📊 Excel</button>
                        </div>
                    </div>
                </div>

                <!-- RIGHT RAIL: LOG AKTIF -->
                <div class="lg:col-span-8">
                    <div class="glass flex flex-col min-h-[600px] shadow-2xl overflow-hidden">
                        <div class="p-5 bg-white/5 border-b border-white/5 flex flex-wrap justify-between items-center gap-4">
                            <h3 class="font-bold uppercase tracking-widest text-[11px] text-blue-300">Live Data Sync ⚡</h3>
                        </div>
                        
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <tbody id="activeBody" class="divide-y divide-white/5 text-white"></tbody>
                            </table>
                            <div id="activeEmpty" class="p-20 text-center opacity-20 hidden">
                                <p class="text-6xl mb-4">📂</p>
                                <p class="text-xs font-bold uppercase tracking-widest">Tiada Rekod Cloud</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-20 mb-10 text-center text-white/10 text-[10px] uppercase tracking-[1em]">
            Sistem Pintar BPK &copy; 2026 | Cloud Persistence v3.0.0
        </footer>
    </div>

    <!-- Audio & Scripts -->
    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        AOS.init();

        // --- KONFIGURASI FIREBASE ---
        // Gantikan dengan Config anda dari Firebase Console
        const firebaseConfig = {
            apiKey: "AIzaSyA-PLACEHOLDER-KEY",
            authDomain: "your-project.firebaseapp.com",
            projectId: "your-project-id",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "your-id",
            appId: "your-app-id"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let tasks = [];

        // --- AUTH LOGIC ---
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userAvatar').src = user.photoURL || '';
                syncData();
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        });

        function loginWith(providerName) {
            let provider;
            if (providerName === 'google') provider = new firebase.auth.GoogleAuthProvider();
            // Provider lain (Yahoo/Microsoft) memerlukan config manual di Firebase Console
            auth.signInWithPopup(provider).catch(err => Swal.fire('Error', err.message, 'error'));
        }

        function logout() {
            auth.signOut();
        }

        // --- DATA LOGIC ---
        function syncData() {
            db.collection("users").doc(currentUser.uid).collection("logs")
              .orderBy("id", "desc")
              .onSnapshot(snapshot => {
                  tasks = snapshot.docs.map(doc => ({ docId: doc.id, ...doc.data() }));
                  renderActive();
              });
        }

        let currentType = 'tugas';
        function setType(type) {
            currentType = type;
            document.getElementById('movementFields').style.display = (type === 'log') ? 'block' : 'none';
            document.getElementById('fuelFields').style.display = (type === 'minyak') ? 'block' : 'none';
        }

        async function saveEntry() {
            const date = document.getElementById('datePicker').value;
            const tFrom = document.getElementById('timeFrom').value;
            if(!date || !tFrom) return Swal.fire('Ralat', 'Tarikh & Masa Mula Wajib', 'error');

            const odo = parseFloat(document.getElementById('odoVal').value) || 0;
            let calculatedKM = 0;
            const lastLog = tasks.find(t => t.odo > 0);
            if(odo > 0 && lastLog) calculatedKM = Math.max(0, odo - lastLog.odo);

            const newEntry = {
                id: Date.now(),
                type: currentType,
                date: date,
                tFrom: tFrom,
                tSemasa: document.getElementById('timeSemasa').value || '-',
                tTo: document.getElementById('timeTo').value || '-',
                from: document.getElementById('fromLoc').value || '-',
                to: document.getElementById('toLoc').value || '-',
                odo: odo,
                distance: calculatedKM,
                note: document.getElementById('taskInput').value || '-',
                userEmail: currentUser.email
            };

            await db.collection("users").doc(currentUser.uid).collection("logs").add(newEntry);
            
            Swal.fire({ icon: 'success', title: 'Cloud Synced!', timer: 800, showConfirmButton: false });
            ['datePicker','timeFrom','timeSemasa','timeTo','fromLoc','toLoc','odoVal','taskInput'].forEach(id => {
                if(document.getElementById(id)) document.getElementById(id).value = '';
            });
        }

        function renderActive() {
            const body = document.getElementById('activeBody');
            body.innerHTML = '';
            if(tasks.length === 0) { document.getElementById('activeEmpty').classList.remove('hidden'); return; }
            document.getElementById('activeEmpty').classList.add('hidden');

            tasks.forEach(t => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-white/5 border-b border-white/5 transition";
                tr.innerHTML = `
                    <td class="p-4 text-[10px] font-bold">📅 ${t.date}</td>
                    <td class="p-4 font-digital text-blue-400 text-[10px]">${t.tFrom} → ${t.tTo}</td>
                    <td class="p-4 text-[11px]">${t.note.substring(0,40)}...</td>
                    <td class="p-4 text-right">
                        <button onclick="deleteEntry('${t.docId}')" class="text-red-500 opacity-30 hover:opacity-100 uppercase text-[8px] font-bold">Delete 🗑️</button>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        async function deleteEntry(docId) {
            const res = await Swal.fire({ title: 'Padam Permanen?', text: 'Data Cloud tidak boleh dikembalikan.', icon: 'warning', showCancelButton: true });
            if(res.isConfirmed) {
                await db.collection("users").doc(currentUser.uid).collection("logs").doc(docId).delete();
            }
        }

        // --- INITIALIZE ---
        flatpickr("#datePicker", { dateFormat: "d-m-Y" });
        ['#timeFrom', '#timeSemasa', '#timeTo'].forEach(id => flatpickr(id, { enableTime: true, noCalendar: true, dateFormat: "h:i K" }));
        
        function updateClock() {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            let ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12; m = m < 10 ? '0'+m : m; s = s < 10 ? '0'+s : s;
            document.getElementById('realTime').textContent = `${h}:${m}:${s}`;
            document.getElementById('realDate').textContent = now.toLocaleDateString('ms-MY');
            document.getElementById('realAMPM').textContent = ampm;
        }
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
