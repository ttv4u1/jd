<!DOCTYPE html>
<html lang="ms">
<head>
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5395525176253885"
     crossorigin="anonymous"></script>
        <meta name="google-adsense-account" content="ca-pub-5395525176253885">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Sistem Intelligent Pilot v17.2</title>
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center; /* Center Vertically */
            justify-content: center; /* Center Horizontally */
            overflow: hidden;
            background: #02050a;
        }

        /* Latar Belakang Futuristik Berwarna-warni */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Gambar Jata Negara sebagai Watermark */
        .jata-watermark {
            position: absolute;
            width: 80%;
            max-width: 500px;
            opacity: 0.15;
            filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.5));
            pointer-events: none;
            z-index: 0;
        }

        /* Overlay Cahaya Futuristik */
        .glow-overlay {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            top: 20%;
            right: 10%;
            filter: blur(50px);
            animation: float 6s infinite alternate;
        }

        @keyframes float {
            from { transform: translateY(0); }
            to { transform: translateY(-40px); }
        }

        /* Glassmorphism Card (Responsive) */
        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%; /* Responsive width */
            max-width: 420px; /* Maximum width for desktop */
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            margin: 20px;
        }

        .logo-jabatan {
            width: 100px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.4));
        }

        h1 {
            color: #ffffff;
            font-size: 1.6rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        p {
            color: #b0b0b0;
            font-size: 0.95rem;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        /* Butang Masuk Futuristik */
        .btn-enter {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
            border: none;
        }

        .btn-enter:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 210, 255, 0.5);
            letter-spacing: 2.5px;
        }

        .btn-enter:active {
            transform: translateY(1px);
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            text-align: center;
            width: 100%;
        }

        /* Media Queries for Mobile Responsiveness */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.3rem;
            }
            .logo-jabatan {
                width: 80px;
            }
        }
    </style>
</head>
<body>

    <!-- Latar Belakang Bergerak -->
    <div class="animated-bg"></div>
    <div class="glow-overlay"></div>
    
    <!-- Jata Negara di belakang (Centred) -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/26/Coat_of_arms_of_Malaysia.svg" class="jata-watermark" alt="Malaysia Coat of Arms">

    <!-- Card Tengah -->
    <div class="login-card">
        <!-- Gantikan URL ini dengan logo jabatan anda -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/26/Coat_of_arms_of_Malaysia.svg" alt="Logo Jabatan" class="logo-jabatan">
        
        <h1>PORTAL RASMI</h1>
        <p>Sila klik butang di bawah untuk akses ke dalam sistem pengurusan buku log rasmi</p>

        <!-- Masukkan URL Sistem Anda di sini -->
        <a href="https://ttv4u1.github.io" class="btn-enter">Log Masuk</a>
    </div>

    <div class="footer">
        &copy; 2024 Hak Cipta Terpelihara Pilot Veterinar Malaysia
    </div>

</body>
</html>
